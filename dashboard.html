    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body id="home">

<header id="header">
  <nav id="main-nav" class="navbar navbar-default navbar-fixed-top">
    <div class="container">
      <div class="navbar-header">
        <a class="navbar-brand" href="index.html">EcoPulse Dynamics</a>
      </div>

      <div class="navbar-collapse navbar-right">
        <ul class="nav navbar-nav">
          <li><a href="index.html">Inicio</a></li>

<div class="container" style="margin-top:120px">

    <h2 class="text-center">Dashboard Energía Solar</h2>
    <hr>

    <div class="form-group">
        <label>Horas de sol al día</label>
        <input type="number" id="hours" min="1" class="form-control" value="5" required>
    </div>

    <div class="form-group">
        <label>Potencia del sistema (kW)</label>
        <input type="number" id="power"  min="1" class="form-control" value="3" required>
    </div>

    <button class="btn btn-primary" onclick="calculateEnergy()">Calcular</button>

    <h3 id="result" style="margin-top:20px;"></h3>

    <canvas id="energyChart" style="margin-top:30px;"></canvas>

</div>

<script src="assets/js/dashboard.js"></script>

</body>
